# Production xInvest Compose
services:
  db:
    image: pgvector/pgvector:pg15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env.production
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine

  backend:
    build: ./backend
    expose:
      - "8000"
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  celery_worker:
    build: ./backend
    command: celery -A core worker -l info
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  celery_beat:
    build: ./backend
    command: celery -A core beat -l info
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - .env.production

  postgrest:
    image: postgrest/postgrest:v12.0.2
    ports:
      - "3001:3000"
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    restart: always

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

  db_backup_cron:
    image: postgres:15-alpine
    volumes:
      - ./backups:/backups
      - ./scripts/cron-entrypoint.sh:/scripts/cron-entrypoint.sh
    env_file:
      - .env.production
    environment:
      - BACKUP_SCHEDULE=59 23 * * *
    depends_on:
      db:
        condition: service_healthy
    entrypoint: /scripts/cron-entrypoint.sh
    restart: always

volumes:
  postgres_data:
