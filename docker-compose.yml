# Production xInvest Compose
services:
  db:
    image: pgvector/pgvector:pg15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env.production
    ports:
      # Loopback-only — reachable via `ssh -L 5432:127.0.0.1:5432 <host>` for
      # DB clients (DBeaver etc), never exposed to the public internet.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine

  migrate:
    image: ${ECR_REGISTRY}/xinvest-backend:${IMAGE_TAG:-latest}
    build: ./backend
    command: python manage.py migrate --noinput
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy

  seed:
    image: ${ECR_REGISTRY}/xinvest-backend:${IMAGE_TAG:-latest}
    build: ./backend
    # DJANGO_SUPERUSER_USERNAME/EMAIL/PASSWORD must be set in .env.production;
    # createsuperuser --noinput is a no-op (exits 0) if that username already exists.
    command: >
      sh -c "python manage.py seed_workflows &&
             (python manage.py createsuperuser --noinput || true)"
    env_file:
      - .env.production
    depends_on:
      migrate:
        condition: service_completed_successfully

  backend:
    image: ${ECR_REGISTRY}/xinvest-backend:${IMAGE_TAG:-latest}
    build: ./backend
    expose:
      - "8000"
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      seed:
        condition: service_completed_successfully
    restart: always

  celery_worker:
    image: ${ECR_REGISTRY}/xinvest-backend:${IMAGE_TAG:-latest}
    build: ./backend
    command: celery -A core worker -l info
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      seed:
        condition: service_completed_successfully
    restart: always

  celery_beat:
    image: ${ECR_REGISTRY}/xinvest-backend:${IMAGE_TAG:-latest}
    build: ./backend
    command: celery -A core beat -l info
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      seed:
        condition: service_completed_successfully
    restart: always

  frontend:
    image: ${ECR_REGISTRY}/xinvest-frontend:${IMAGE_TAG:-latest}
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - .env.production

  postgrest:
    image: postgrest/postgrest:v12.0.2
    ports:
      - "3001:3000"
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    restart: always

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

  db_backup_cron:
    image: postgres:15-alpine
    volumes:
      - ./backups:/backups
      - ./scripts/cron-entrypoint.sh:/scripts/cron-entrypoint.sh
    env_file:
      - .env.production
    environment:
      - BACKUP_SCHEDULE=59 23 * * *
    depends_on:
      db:
        condition: service_healthy
    entrypoint: /scripts/cron-entrypoint.sh
    restart: always

volumes:
  postgres_data:
