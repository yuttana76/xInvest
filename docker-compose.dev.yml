# Development xInvest Compose
services:

# 1. บริการ Cloudflare Tunnel Connector
  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --protocol http2
    env_file:
      - .env.dev

  db:
    image: pgvector/pgvector:pg15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env.dev
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
      

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - huggingface_cache:/root/.cache/huggingface
    env_file:
      - .env.dev
    environment:
      - TZ=Asia/Bangkok
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  celery_worker:
    build: ./backend
    command: celery -A core worker -l info
    volumes:
      - ./backend:/app
      - huggingface_cache:/root/.cache/huggingface
    env_file:
      - .env.dev
    environment:
      - TZ=Asia/Bangkok
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  celery_beat:
    build: ./backend
    command: celery -A core beat -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env.dev
    environment:
      - TZ=Asia/Bangkok
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  flower:
    # Official lightweight image — Flower only talks to the Redis broker,
    # it doesn't need the Django app/backend image at all.
    # Note: broker must be set via CELERY_BROKER_URL env var — a --broker
    # CLI flag is silently ignored by this image's entrypoint.
    image: mher/flower:2.0
    ports:
      - "5555:5555"
    environment:
      - TZ=Asia/Bangkok
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
      celery_worker:
        condition: service_started
    restart: always

  db_backup_cron:
    image: postgres:15-alpine
    volumes:
      - ./backups:/backups
      - ./scripts/cron-entrypoint.sh:/scripts/cron-entrypoint.sh
    env_file:
      - .env.dev
    environment:
      - BACKUP_SCHEDULE=59 23 * * *
    depends_on:
      db:
        condition: service_healthy
    entrypoint: /scripts/cron-entrypoint.sh
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    env_file:
      - .env.dev
    restart: always

  postgrest:
    image: postgrest/postgrest:v12.0.2
    ports:
      - "3001:3000"
    env_file:
      - .env.dev
    depends_on:
      db:
        condition: service_healthy
    restart: always

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  postgres_data:
  frontend_node_modules:
  huggingface_cache:
  # ollama_data:

networks:
  default:
    name: xinvest-network

