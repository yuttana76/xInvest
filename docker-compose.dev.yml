# Development xInvest Compose
services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env.dev
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env.dev
    environment:
      - TZ=Asia/Bangkok
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  celery_worker:
    build: ./backend
    command: celery -A core worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env.dev
    environment:
      - TZ=Asia/Bangkok
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  celery_beat:
    build: ./backend
    command: celery -A core beat -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env.dev
    environment:
      - TZ=Asia/Bangkok
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  flower:
    build: ./backend
    command: celery -A core flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env.dev
    environment:
      - TZ=Asia/Bangkok
    depends_on:
      redis:
        condition: service_started
      celery_worker:
        condition: service_started
    restart: always

  # db_backup_on_startup:
  #   image: postgres:15-alpine
  #   volumes:
  #     - ./backups:/backups
  #   env_file:
  #     - .env.dev
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   command: >
  #     sh -c "PGPASSWORD=$$POSTGRES_PASSWORD pg_dump -h db -U $$POSTGRES_USER $$POSTGRES_DB > /backups/startup_backup_$$(date +%Y%m%d_%H%M%S).sql"
  #   restart: "no"

  db_backup_cron:
    image: postgres:15-alpine
    volumes:
      - ./backups:/backups
      - ./scripts/cron-entrypoint.sh:/scripts/cron-entrypoint.sh
    env_file:
      - .env.dev
    environment:
      - BACKUP_SCHEDULE=59 23 * * *
    depends_on:
      db:
        condition: service_healthy
    entrypoint: /scripts/cron-entrypoint.sh
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    env_file:
      - .env.dev
    restart: always

  postgrest:
    image: postgrest/postgrest:v12.0.2
    ports:
      - "3001:3000"
    env_file:
      - .env.dev
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
  frontend_node_modules:
